<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Street Market — Contacto</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px 60px;
  }
  .wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* LOGO */
  .logo-wrap {
    width: 200px;
    margin-bottom: 28px;
  }
  .logo-wrap img {
    width: 100%;
    display: block;
  }

  /* HEADING */
  .heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: #d4ff00;
    text-align: center;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* BUTTONS */
  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 8px;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    text-decoration: none;
    color: #fff;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .btn:hover {
    background: #d4ff00;
    border-color: #d4ff00;
    color: #000;
    transform: translateY(-1px);
  }
  .btn:active {
    transform: translateY(0);
  }
  .btn-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    color: #d4ff00;
  }
  .btn:hover .btn-icon {
    color: #000;
  }
  .btn-icon svg {
    width: 22px;
    height: 22px;
  }
  .btn-text {
    flex: 1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 0.1em;
  }
  .btn-arrow {
    font-size: 16px;
    opacity: 0.4;
  }
  .btn:hover .btn-arrow {
    opacity: 1;
  }
</style>
</head>
